<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário Multi-Etapas Premium</title>
  <style>
    :root {
      --accent: #ff0040;
      --bg: #0a0a0a;
      --glass: rgba(255,255,255,0.05);
    }
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      width: 400px;
      box-shadow: 0 0 30px rgba(255,0,64,0.2);
      position: relative;
    }
    h2 {
      text-align: center;
      margin: 0 0 20px;
    }
    .steps-progress {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-bottom: 25px;
      overflow: hidden;
    }
    .steps-progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #6a0dad);
      transition: width 0.4s ease;
    }
    .step {
      display: none;
      animation: fadeIn 0.5s ease;
    }
    .step.active { display: block; }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .valid { border: 2px solid lime; }
    .invalid { border: 2px solid crimson; }
    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }
    button {
      background: var(--accent);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { filter: brightness(1.2); }
    .avatar-preview {
      text-align: center;
      margin: 10px 0;
    }
    .avatar-preview img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }
    .success {
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Cadastro Premium</h2>
    <div class="steps-progress"><span></span></div>
    <form id="multiForm">
      <!-- Step 1 -->
      <div class="step active">
        <input type="text" id="name" placeholder="Seu nome completo" required>
        <input type="email" id="email" placeholder="Seu e-mail" required>
      </div>

      <!-- Step 2 -->
      <div class="step">
        <input type="password" id="password" placeholder="Senha (mín 8 chars)" required>
        <input type="password" id="confirm" placeholder="Confirme a senha" required>
      </div>

      <!-- Step 3 -->
      <div class="step">
        <select id="gender" required>
          <option value="">Selecione o gênero</option>
          <option>Masculino</option>
          <option>Feminino</option>
          <option>Outro</option>
        </select>
        <input type="file" id="avatar" accept="image/*">
        <div class="avatar-preview"><img id="avatarImg" src="" alt="" hidden></div>
      </div>

      <div class="buttons">
        <button type="button" id="prevBtn">Voltar</button>
        <button type="button" id="nextBtn">Próximo</button>
      </div>
    </form>

    <div class="success">
      <h3>🎉 Cadastro concluído!</h3>
      <p>Bem-vindo(a) à plataforma premium 🚀</p>
    </div>
  </div>

  <script>
    const steps = document.querySelectorAll(".step");
    const progress = document.querySelector(".steps-progress span");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const form = document.getElementById("multiForm");
    const success = document.querySelector(".success");
    let currentStep = 0;

    // Inputs
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const passInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirm");
    const genderInput = document.getElementById("gender");
    const avatarInput = document.getElementById("avatar");
    const avatarImg = document.getElementById("avatarImg");

    // Validações em tempo real
    nameInput.addEventListener("input", () => validate(nameInput, nameInput.value.length >= 3));
    emailInput.addEventListener("input", () => validate(emailInput, /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailInput.value)));
    passInput.addEventListener("input", () => validate(passInput, passInput.value.length >= 8));
    confirmInput.addEventListener("input", () => validate(confirmInput, confirmInput.value === passInput.value));

    function validate(el, condition){
      el.classList.remove("valid","invalid");
      el.classList.add(condition ? "valid" : "invalid");
      return condition;
    }

    // Preview avatar
    avatarInput.addEventListener("change", e=>{
      const file = e.target.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = ()=> {
          avatarImg.src = reader.result;
          avatarImg.hidden = false;
        };
        reader.readAsDataURL(file);
      }
    });

    // Navegação
    function showStep(i){
      steps.forEach(s=>s.classList.remove("active"));
      steps[i].classList.add("active");
      progress.style.width = ((i+1)/steps.length*100)+"%";
      prevBtn.style.display = i===0?"none":"inline-block";
      nextBtn.textContent = i===steps.length-1?"Enviar":"Próximo";
    }
    showStep(currentStep);

    nextBtn.addEventListener("click", async ()=>{
      if(!validateStep(currentStep)) return;

      if(currentStep < steps.length-1){
        currentStep++;
        showStep(currentStep);
      } else {
        // Submit via fetch (mock)
        const data = {
          name: nameInput.value,
          email: emailInput.value,
          password: passInput.value,
          gender: genderInput.value
        };
        console.log("Enviando para API:", data);
        // Simulando API
        await new Promise(res=>setTimeout(res,1500));
        form.style.display="none";
        success.style.display="block";
      }
    });

    prevBtn.addEventListener("click", ()=>{
      if(currentStep>0){
        currentStep--;
        showStep(currentStep);
      }
    });

    function validateStep(step){
      if(step===0){
        return validate(nameInput,nameInput.value.length>=3) && 
               validate(emailInput,/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailInput.value));
      }
      if(step===1){
        return validate(passInput,passInput.value.length>=8) &&
               validate(confirmInput,confirmInput.value===passInput.value);
      }
      if(step===2){
        return genderInput.value!=="";
      }
      return true;
    }
  </script>
</body>
</html>

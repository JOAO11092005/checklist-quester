<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevQuest Cursos</title>
  <style>
    :root {
      --color-primary: #7a3df0;
      --color-secondary: #2a2a2a;
      --color-bg: #121212;
      --color-text: #ffffff;
      --color-muted: #aaa;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
    }

    /* HERO */
    .hero {
      min-height: 400px;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,1)),
        url('https://cdn.areademembros.com/files/instancia_3760/image/KMviLJ89quCpIRGPpsCskf0slMD4XUH2yA63Rb0d.jpg');
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: fadeIn 1s ease-in;
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--color-muted);
      margin-bottom: 20px;
    }

    .hero .cta {
      background: var(--color-primary);
      padding: 15px 30px;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .hero .cta:hover {
      background: darkviolet;
      transform: scale(1.05);
    }

    /* CARROSSEL */
    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 20px;
      scroll-behavior: smooth;
    }
    .carousel::-webkit-scrollbar { display: none; }

    .highlight-card {
      min-width: 250px;
      background: var(--color-secondary);
      border-radius: 10px;
      padding: 15px;
      flex-shrink: 0;
    }
    .highlight-card h3 { margin: 10px 0; }

    /* SEÇÃO CURSOS */
    .courses {
      padding: 40px;
    }

    .courses-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .courses-header input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      min-width: 200px;
    }

    .filters button {
      padding: 8px 15px;
      margin: 5px;
      border: 1px solid var(--color-primary);
      border-radius: 6px;
      background: none;
      color: var(--color-primary);
      cursor: pointer;
    }
    .filters button.active {
      background: var(--color-primary);
      color: white;
    }

    .course-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .course-card {
      background: var(--color-secondary);
      padding: 20px;
      border-radius: 10px;
      position: relative;
    }

    .course-card h3 { margin: 0 0 10px; }
    .course-card p { color: var(--color-muted); }

    .favorite {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      font-size: 20px;
      color: #666;
    }
    .favorite.active { color: gold; }

    .progress-bar {
      height: 8px;
      background: #333;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--color-primary);
      transition: width 0.4s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1>DevQuest Full-Stack</h1>
      <p>Do zero à sua primeira vaga de programação 🚀</p>
      <button class="cta">Comece Agora</button>
    </div>
  </section>

  <!-- CARROSSEL -->
  <section>
    <h2 style="padding-left:20px;">Cursos em Destaque</h2>
    <div class="carousel" id="carousel">
      <!-- Cards em destaque -->
    </div>
  </section>

  <!-- CURSOS -->
  <section class="courses">
    <div class="courses-header">
      <h2>Cursos Disponíveis</h2>
      <input type="text" id="search" placeholder="Buscar curso...">
    </div>
    <div class="filters">
      <button data-category="all" class="active">Todos</button>
      <button data-category="Frontend">Frontend</button>
      <button data-category="Backend">Backend</button>
      <button data-category="Full-Stack">Full-Stack</button>
    </div>
    <div class="course-list" id="course-list"></div>
  </section>

  <script>
    // Cursos simulados
    const courses = [
      { id:1, title:"HTML & CSS", category:"Frontend", featured:true },
      { id:2, title:"JavaScript Avançado", category:"Frontend", featured:true },
      { id:3, title:"Node.js com Express", category:"Backend" },
      { id:4, title:"Banco de Dados SQL", category:"Backend" },
      { id:5, title:"React para Iniciantes", category:"Frontend", featured:true },
      { id:6, title:"Full-Stack com MERN", category:"Full-Stack" },
    ];

    const courseList = document.getElementById("course-list");
    const carousel = document.getElementById("carousel");
    const searchInput = document.getElementById("search");
    const filterBtns = document.querySelectorAll(".filters button");

    // Favoritos do localStorage
    let favorites = JSON.parse(localStorage.getItem("favorites")) || {};

    // Renderizar cursos
    function renderCourses(list) {
      courseList.innerHTML = "";
      list.forEach(c => {
        const card = document.createElement("div");
        card.className = "course-card";
        card.innerHTML = `
          <h3>${c.title}</h3>
          <p>${c.category}</p>
          <span class="favorite ${favorites[c.id] ? 'active':''}">★</span>
          <div class="progress-bar"><div class="progress-fill" id="progress-${c.id}"></div></div>
          <button onclick="increaseProgress(${c.id})">Avançar progresso</button>
        `;
        // favorito
        const fav = card.querySelector(".favorite");
        fav.addEventListener("click", () => {
          favorites[c.id] = !favorites[c.id];
          localStorage.setItem("favorites", JSON.stringify(favorites));
          fav.classList.toggle("active");
        });
        courseList.appendChild(card);
      });
    }

    // Renderizar carrossel
    function renderCarousel() {
      const featured = courses.filter(c=>c.featured);
      featured.forEach(c=>{
        const card = document.createElement("div");
        card.className = "highlight-card";
        card.innerHTML = `<h3>${c.title}</h3><p>${c.category}</p>`;
        carousel.appendChild(card);
      });
    }

    // Progresso
    function increaseProgress(id) {
      const fill = document.getElementById(`progress-${id}`);
      let current = parseInt(fill.style.width) || 0;
      if (current < 100) {
        fill.style.width = (current+20)+"%";
      }
    }

    // Busca
    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase();
      const filtered = courses.filter(c => 
        c.title.toLowerCase().includes(term) || 
        c.category.toLowerCase().includes(term)
      );
      renderCourses(filtered);
    });

    // Filtros
    filterBtns.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        filterBtns.forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        const cat = btn.dataset.category;
        const filtered = cat==="all" ? courses : courses.filter(c=>c.category===cat);
        renderCourses(filtered);
      });
    });

    // Inicializar
    renderCourses(courses);
    renderCarousel();
  </script>

</body>
</html>

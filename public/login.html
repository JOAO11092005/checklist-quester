<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-color: #6c5ce7;
            --background-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #ffffff;
            --text-color-muted: #a7a7a7;
            --border-color: #333333;
            --danger-color: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            background-color: var(--surface-color);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .image-panel {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1593720213428-28a5b9e94613?q=80&w=2070&auto=format&fit=crop'); /* <-- TROQUE ESTA URL PELA SUA IMAGEM */
            background-size: cover;
            background-position: center;
        }

        .form-panel {
            flex: 1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header h1 {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-header p {
            color: var(--text-color-muted);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-color-muted);
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1em;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.3);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-options a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s ease;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-button:hover:not(:disabled) {
            background-color: #5a4ac9;
            transform: translateY(-2px);
        }

        .login-button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        #error-message {
            color: var(--danger-color);
            margin-top: 20px;
            font-weight: 500;
            min-height: 1.2em;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .image-panel {
                display: none;
            }
            .form-panel {
                padding: 40px 30px;
            }
            .login-wrapper {
                flex-direction: column;
                min-height: auto;
                max-width: 450px;
            }
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="image-panel"></div>
        <div class="form-panel">
            <div class="form-header">
                <h1>Bem-vindo de volta</h1>
                <p>Por favor, insira seus dados para continuar.</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="input-field" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="input-field" required>
                </div>

                <div class="form-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Lembrar-me</label>
                    </div>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" id="login-button" class="login-button">
                    <span id="button-text">Entrar</span>
                    <i id="button-icon"></i>
                </button>
            </form>
            <p id="error-message"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9UUXIt6psEnOluZg530YBqE35Nkzlp0Y",
            authDomain: "finamceiro-5d9ae.firebaseapp.com",
            databaseURL: "https://finamceiro-5d9ae-default-rtdb.firebaseio.com",
            projectId: "finamceiro-5d9ae",
            storageBucket: "finamceiro-5d9ae.appspot.com",
            messagingSenderId: "90531422877",
            appId: "1:90531422877:web:0b9fee54c03ba81d68aa74"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessageElement = document.getElementById('error-message');
        const loginButton = document.getElementById('login-button');
        const buttonText = document.getElementById('button-text');
        const buttonIcon = document.getElementById('button-icon');
        
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.replace('admin.html');
            }
        });

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorMessageElement.textContent = '';
            
            loginButton.disabled = true;
            buttonText.textContent = 'Entrando...';
            buttonIcon.className = 'fas fa-spinner fa-spin';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                let friendlyMessage = "Ocorreu um erro. Tente novamente.";

                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    friendlyMessage = "Email ou senha inválidos.";
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMessage = "O formato do email é inválido.";
                }
                
                errorMessageElement.textContent = friendlyMessage;

                loginButton.disabled = false;
                buttonText.textContent = 'Entrar';
                buttonIcon.className = '';
            }
        });
    </script>
</body>
</html>
